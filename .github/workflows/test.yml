name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        # Ruff replaces pyflakes here. The rule set (just F today) is
        # configured in pyproject.toml so local `make lint` and CI agree.
        run: ruff check .

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing tests/ -v

      - name: Validate OpenAPI spec is in sync
        # `make openapi` regenerates docs/openapi.json from the live
        # url_map; this step fails if the committed spec drifted away
        # from what the routes actually wire up.
        run: make openapi-check
