[pytest]
# This file belongs at the LoRa-CP repo root (same level as app/, config.py)
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    sheets: requires Google Sheets API access (set TEST_SPREADSHEET_ID)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
