[tool.ruff]
# Match the runtime target so type-aware rules + autofixes use the right syntax.
target-version = "py313"
# Wider than ruff's default 88 — existing code has a lot of moderately long
# lines and reflowing them would create churn for no real readability win.
line-length = 120

# Don't lint third-party or build artifacts.
extend-exclude = [
    "venv",
    "venv*",
    ".venv",
    "alembic/versions",
    "ESP_*",
    "2025_data",
]

[tool.ruff.lint]
# Rule sets enabled, in order of strictness:
#   "F"     — pyflakes: undefined names, unused imports, etc. (real bugs)
#   "I"     — isort: deterministic import ordering
#   "UP"    — pyupgrade: modern syntax (e.g. `dict[X]` over `Dict[X]`)
#   "B"     — flake8-bugbear: real bug-prone patterns
#   "E","W" — pycodestyle: style errors and warnings
select = ["F", "I", "UP", "B", "E", "W"]

# Keep the noqa intent we already had: `# noqa: F401` on the model
# registration import in app/__init__.py is honored automatically by ruff.

[tool.ruff.lint.per-file-ignores]
# Test files are allowed to do test-y things.
"tests/**/*.py" = ["F841"]
# stress_test imports rich modules conditionally inside try/except guards;
# treat its imports as documentation rather than enforce strictness there.
"tests/stress_test.py" = ["F401", "F841"]
# CLI scripts and conftest legitimately manipulate sys.path before importing
# `app.*` so they can run from arbitrary CWDs. E402 (import-not-at-top) is
# the natural cost of that pattern.
"scripts/*.py" = ["E402"]
"tests/conftest.py" = ["E402"]

[tool.ruff.format]
# Black-compatible settings; not run automatically — invoked via `make format`
# when someone wants to opt in. Documenting the choice here so a future
# format pass produces predictable output.
quote-style = "double"
indent-style = "space"
line-ending = "auto"
