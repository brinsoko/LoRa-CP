services:
  web:
    image: ghcr.io/brinsoko/lora-cp/lora-kt-web:latest
    env_file:
      - .env
    volumes:
      - ../instance:/app/instance
      - ../data:/app/data
    networks:
      - app
    restart: unless-stopped

  # The one and only Sheets writer: drains the sheets_sync_jobs outbox
  # (web workers only enqueue). Exactly one replica, ever - a second
  # instance would split the API throttle window and race writes.
  sheets-worker:
    image: ghcr.io/brinsoko/lora-cp/lora-kt-web:latest
    command: ["flask", "--app", "wsgi:app", "sheets-worker"]
    env_file:
      - .env
    volumes:
      - ../instance:/app/instance
      - ../data:/app/data
    networks:
      - app
    depends_on:
      - web
    restart: unless-stopped


  caddy:
    image: caddy:2-alpine
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app
    depends_on:
      - web
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

networks:
  app:
    driver: bridge
